<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e agora? · Diagnóstico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f0f0f;--ink2:#2a2a2a;--ink3:#686868;--ink4:#9a9a9a;
    --bg:#f7f5ef;--bg2:#efede6;--bg3:#e3dfd4;--white:#fffdf8;
    --border:#e4dfd2;--border-md:#d0c8b8;--border-hi:#9d927f;
    --green:#0f6e56;--blue:#185fa5;--amber:#8a5a10;--purple:#5140a0;
    --r:14px;--rlg:24px;--rfull:999px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 50% 0%,#fffdf8 0%,var(--bg) 45%,#eee8da 100%);color:var(--ink);min-height:100vh}
  .topbar{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(247,245,239,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:10}
  .logo{font-size:18px;font-weight:600;letter-spacing:-.03em;color:var(--ink);text-decoration:none}
  .progress-bar{flex:1;max-width:320px;margin:0 40px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--ink);border-radius:2px;transition:width .4s ease}
  .progress-label{font-size:11.5px;color:var(--ink3);font-family:'IBM Plex Mono',monospace}
  .page{display:none;min-height:100vh;padding:100px 24px 80px}.page.active{display:flex;flex-direction:column;align-items:center}.inner{width:100%;max-width:560px}.inner-wide{width:100%;max-width:1120px}
  .step-label,.q-num{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}.step-h{font-size:34px;font-weight:650;letter-spacing:-.04em;line-height:1.06;color:var(--ink);margin-bottom:10px}.step-sub{font-size:14px;color:var(--ink3);line-height:1.65;margin-bottom:36px;font-weight:300}
  .goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}.goal-card{border:1px solid var(--border-md);border-radius:var(--rlg);padding:18px;cursor:pointer;background:rgba(255,253,248,.76);transition:all .15s}.goal-card:hover{border-color:var(--border-hi);transform:translateY(-1px)}.goal-card.sel{border:1.5px solid var(--ink);background:var(--white);box-shadow:0 18px 46px rgba(15,15,15,.07)}.goal-icon{font-size:20px;margin-bottom:8px}.goal-title{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.35}.goal-horizon{font-size:11px;color:var(--ink3);margin-top:4px;font-family:'IBM Plex Mono',monospace}
  .q-text{font-size:21px;font-weight:600;letter-spacing:-.02em;line-height:1.3;margin-bottom:8px}.q-insight{font-size:12px;color:var(--ink4);font-style:italic;margin-bottom:28px;font-family:'IBM Plex Mono',monospace}.options{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}.opt{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid var(--border-md);border-radius:var(--r);cursor:pointer;background:rgba(255,253,248,.84);transition:all .12s}.opt:hover{border-color:var(--border-hi)}.opt.sel{border:1.5px solid var(--ink);background:var(--white)}.opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--ink4);flex-shrink:0;display:flex;align-items:center;justify-content:center}.opt.sel .opt-radio{border-color:var(--ink);background:var(--ink)}.opt.sel .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--white)}.opt-text{font-size:13.5px;line-height:1.4}
  .btn-row{display:flex;gap:10px;align-items:center}.btn-next,.btn-dark{padding:12px 28px;background:var(--ink);color:var(--white);border:none;border-radius:var(--rfull);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn-next:hover,.btn-dark:hover{opacity:.82}.btn-next:disabled{opacity:.3;cursor:not-allowed}.btn-back-sm,.btn-light{padding:12px 20px;background:transparent;border:1px solid var(--border-md);border-radius:var(--rfull);font-size:13px;font-family:'Inter',sans-serif;color:var(--ink3);cursor:pointer;transition:all .12s;text-decoration:none}.btn-back-sm:hover,.btn-light:hover{border-color:var(--border-hi);color:var(--ink)}
  .result-hero{display:grid;grid-template-columns:1fr 1.2fr;gap:18px;align-items:stretch;margin-bottom:18px}.profile-panel,.goal-panel,.map-card,.detail-card,.broker-card{background:rgba(255,253,248,.82);border:1px solid var(--border-md);border-radius:28px;box-shadow:0 24px 70px rgba(15,15,15,.06)}.profile-panel{padding:28px}.result-badge{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}.result-type{font-size:48px;font-weight:700;letter-spacing:-.055em;line-height:.98;margin-bottom:12px}.result-desc{font-size:14px;color:var(--ink3);line-height:1.65;font-weight:300}.result-msg{font-size:13px;color:var(--ink2);line-height:1.6;margin-top:16px;padding:14px;border-radius:16px;background:var(--bg2)}.goal-panel{padding:28px;display:flex;flex-direction:column;justify-content:center}.goal-title-big{font-size:24px;font-weight:650;letter-spacing:-.03em;margin-bottom:10px}.goal-insight-text{font-size:14px;color:var(--ink3);line-height:1.65;font-weight:300}.source-note{font-size:11px;color:var(--ink4);font-family:'IBM Plex Mono',monospace;margin-top:14px;line-height:1.55}
  .map-section{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start}.map-card{padding:20px}.map-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.map-title{font-size:22px;font-weight:650;letter-spacing:-.035em}.map-sub{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-top:5px}.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.legend span{font-size:10.5px;font-family:'IBM Plex Mono',monospace;padding:5px 8px;border-radius:999px;background:var(--bg2);color:var(--ink3)}
  .investment-map{position:relative;height:590px;border-radius:24px;background:linear-gradient(90deg,rgba(15,15,15,.035) 1px,transparent 1px),linear-gradient(0deg,rgba(15,15,15,.035) 1px,transparent 1px),radial-gradient(circle at 16% 84%,rgba(15,110,86,.12),transparent 28%),radial-gradient(circle at 82% 82%,rgba(138,90,16,.13),transparent 30%),radial-gradient(circle at 80% 20%,rgba(81,64,160,.13),transparent 32%),#fbf8f0;background-size:25% 25%,25% 25%,auto,auto,auto,auto;border:1px solid var(--border);overflow:hidden}.axis-label{position:absolute;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--ink4);letter-spacing:.05em;text-transform:uppercase;z-index:1}.axis-x-left{left:18px;bottom:14px}.axis-x-right{right:18px;bottom:14px}.axis-y-top{left:18px;top:14px}.axis-y-bottom{left:18px;bottom:40px}.axis-title-x{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--ink3);font-family:'IBM Plex Mono',monospace}.axis-title-y{position:absolute;left:-29px;top:50%;transform:rotate(-90deg);font-size:11px;font-weight:700;color:var(--ink3);font-family:'IBM Plex Mono',monospace}.quadrant{position:absolute;font-size:11px;color:rgba(15,15,15,.28);font-weight:600;letter-spacing:-.01em}.q1{left:26px;top:58px}.q2{right:28px;top:58px}.q3{left:26px;bottom:72px}.q4{right:28px;bottom:72px}
  .bubble{position:absolute;transform:translate(-50%,50%);border:none;border-radius:999px;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;line-height:1.05;color:var(--ink);background:rgba(255,253,248,.95);border:1px solid rgba(15,15,15,.13);box-shadow:0 13px 34px rgba(15,15,15,.1);transition:transform .16s, opacity .16s, box-shadow .16s, filter .16s;z-index:2}.bubble:hover{transform:translate(-50%,50%) scale(1.08);z-index:5}.bubble.primary{background:#0f0f0f;color:#fff;border-color:#0f0f0f;box-shadow:0 0 0 7px rgba(15,15,15,.07),0 20px 48px rgba(15,15,15,.22)}.bubble.secondary{background:#fffdf8;border:2px solid var(--green);box-shadow:0 0 0 6px rgba(15,110,86,.08),0 16px 38px rgba(15,110,86,.12)}.bubble.goal{background:#fffdf8;border:2px dashed var(--amber)}.bubble.neutral{opacity:.52;filter:saturate(.65)}.bubble.not_yet{opacity:.25;filter:grayscale(1)}.bubble.selected{outline:3px solid rgba(15,15,15,.2);transform:translate(-50%,50%) scale(1.12);z-index:6}.bubble small{display:block;font-size:9px;font-weight:500;opacity:.72;margin-top:2px}
  .detail-card{padding:22px;position:sticky;top:84px}.fit-tag{display:inline-flex;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 9px;border-radius:999px;background:var(--bg2);color:var(--ink3);margin-bottom:12px}.detail-name{font-size:26px;font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-bottom:8px}.detail-meta{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}.pill{font-size:11px;color:var(--ink3);padding:6px 9px;border-radius:999px;background:var(--bg2);font-family:'IBM Plex Mono',monospace}.detail-block{margin-top:16px}.detail-label{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}.detail-text{font-size:13px;color:var(--ink3);line-height:1.62;font-weight:300}.broker-card{padding:20px;margin-top:18px}.broker-title{font-size:15px;font-weight:700;margin-bottom:8px}.broker-text{font-size:12.5px;color:var(--ink3);line-height:1.55;margin-bottom:14px}.broker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.broker-link{font-size:12px;text-align:center;color:var(--ink);text-decoration:none;border:1px solid var(--border-md);border-radius:999px;padding:9px;background:rgba(255,255,255,.45);transition:all .12s}.broker-link:hover{border-color:var(--ink);background:var(--white)}.btn-restart{width:100%;margin-top:18px}
  @media(max-width:900px){.result-hero,.map-section{grid-template-columns:1fr}.detail-card{position:relative;top:auto}.investment-map{height:560px}.result-type{font-size:42px}}@media(max-width:620px){.topbar{padding:0 16px}.progress-bar{margin:0 18px}.page{padding:92px 16px 56px}.goals-grid{grid-template-columns:1fr}.investment-map{height:520px}.bubble{font-size:9.5px}.map-head{display:block}.legend{justify-content:flex-start;margin-top:10px}.broker-grid{grid-template-columns:1fr}.result-hero{gap:12px}.profile-panel,.goal-panel,.map-card,.detail-card{border-radius:22px;padding:18px}}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">e agora?</a>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <span class="progress-label" id="progress-label">0 / 6</span>
</div>

<div id="page-goal" class="page active">
  <div class="inner">
    <p class="step-label">Passo 1 de 6</p>
    <h1 class="step-h">Antes do produto, vem o sonho.</h1>
    <p class="step-sub">Escolha o que você quer construir agora. A plataforma não começa por “renda fixa” ou “ações”. Começa pelo motivo.</p>
    <div class="goals-grid" id="goals-grid"></div>
    <div class="btn-row"><button class="btn-next" id="btn-goal" onclick="goToQuestions()" disabled>Continuar →</button></div>
  </div>
</div>

<div id="page-question" class="page">
  <div class="inner">
    <p class="q-num" id="q-num"></p>
    <h2 class="q-text" id="q-text"></h2>
    <p class="q-insight" id="q-insight"></p>
    <div class="options" id="options-list"></div>
    <div class="btn-row">
      <button class="btn-back-sm" onclick="prevQuestion()">← Voltar</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>Continuar →</button>
    </div>
  </div>
</div>

<div id="page-result" class="page">
  <div class="inner-wide" id="result-inner"></div>
</div>

<script>
  let state = {goal:null, questions:[], goals:[], answers:{}, currentQ:0, result:null, selectedProduct:null};
  const profileColors = {preserver:'#0f6e56', follower:'#185fa5', independent:'#8a5a10', accumulator:'#5140a0'};
  const brokers = [
    ['XP','https://www.xpi.com.br/'], ['Nubank','https://nubank.com.br/'],
    ['BTG','https://www.btgpactual.com/'], ['Rico','https://www.rico.com.vc/'],
    ['Inter','https://www.bancointer.com.br/']
  ];

  async function init(){
    const [qRes,gRes] = await Promise.all([fetch('/api/questions'), fetch('/api/goals')]);
    state.questions = await qRes.json(); state.goals = await gRes.json(); renderGoals();
  }
  function renderGoals(){
    const icons={viagem:'✈️',aposentadoria:'🌅',renda_passiva:'💸',empresa:'🚀',imovel:'🏠',filhos:'👧',seguranca:'🛡️',liberdade:'🗝️'};
    const horizons={curto:'Curto prazo',medio:'Médio prazo',longo:'Longo prazo',curto_medio:'Curto a médio prazo',medio_longo:'Médio a longo prazo'};
    document.getElementById('goals-grid').innerHTML=state.goals.map(g=>`
      <div class="goal-card" data-id="${g.id}" onclick="selectGoal(this)">
        <div class="goal-icon">${icons[g.id]||'💡'}</div><p class="goal-title">${g.label}</p><p class="goal-horizon">${horizons[g.horizon]||g.horizon}</p>
      </div>`).join('');
  }
  function selectGoal(el){document.querySelectorAll('.goal-card').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');state.goal=el.dataset.id;document.getElementById('btn-goal').disabled=false;}
  function updateProgress(){const total=state.questions.length+1;const current=state.currentQ+1;document.getElementById('progress').style.width=Math.round((current/(total+1))*100)+'%';document.getElementById('progress-label').textContent=`${current} / ${total}`;}
  function goToQuestions(){showPage('page-question');state.currentQ=0;renderQuestion();}
  function renderQuestion(){
    const q=state.questions[state.currentQ];document.getElementById('q-num').textContent=`Pergunta ${state.currentQ+1} de ${state.questions.length}`;document.getElementById('q-text').textContent=q.text;document.getElementById('q-insight').textContent=q.insight;
    const current=state.answers[q.id];document.getElementById('options-list').innerHTML=q.options.map(o=>`
      <div class="opt${current===o.id?' sel':''}" data-qid="${q.id}" data-aid="${o.id}" onclick="selectAnswer(this)"><div class="opt-radio"></div><span class="opt-text">${o.text}</span></div>`).join('');
    document.getElementById('btn-next').disabled=!current;document.getElementById('btn-next').textContent='Continuar →';updateProgress();
  }
  function selectAnswer(el){const qid=el.dataset.qid, aid=el.dataset.aid;document.querySelectorAll(`.opt[data-qid="${qid}"]`).forEach(o=>o.classList.remove('sel'));el.classList.add('sel');state.answers[qid]=aid;document.getElementById('btn-next').disabled=false;}
  async function nextQuestion(){if(state.currentQ<state.questions.length-1){state.currentQ++;renderQuestion();}else{await submitDiagnosis();}}
  function prevQuestion(){if(state.currentQ>0){state.currentQ--;renderQuestion();}else{showPage('page-goal');document.getElementById('progress').style.width='0%';document.getElementById('progress-label').textContent='0 / 6';}}
  async function submitDiagnosis(){
    const btn=document.getElementById('btn-next');btn.disabled=true;btn.textContent='Analisando seu mapa...';
    const res=await fetch('/api/script',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers:state.answers,goal:state.goal})});
    state.result=await res.json();state.selectedProduct=(state.result.universe_products||[])[0];renderResult();
  }
  function renderResult(){
    const r=state.result;document.getElementById('progress').style.width='100%';document.getElementById('progress-label').textContent='Mapa pronto';
    document.getElementById('result-inner').innerHTML=`
      <section class="result-hero">
        <div class="profile-panel">
          <p class="result-badge">Seu perfil patrimonial</p>
          <h2 class="result-type" style="color:${profileColors[r.profile]||'#0f0f0f'}">${r.profile_label}</h2>
          <p class="result-desc">${r.profile_description}</p>
          <div class="result-msg">${r.profile_message}</div>
          <p class="source-note">${r.source}</p>
        </div>
        <div class="goal-panel">
          <p class="result-badge">Seu sonho agora</p>
          <h3 class="goal-title-big">${r.goal_label}</h3>
          <p class="goal-insight-text">${r.goal_insight||''}</p>
        </div>
      </section>
      <section class="map-section">
        <div class="map-card">
          <div class="map-head">
            <div><h3 class="map-title">Mapa do universo de investimentos</h3><p class="map-sub">Cada bolha é um produto. O eixo horizontal mostra risco. O vertical mostra liquidez. As bolhas iluminadas combinam melhor com seu perfil e seu objetivo.</p></div>
            <div class="legend"><span>preto = perfil</span><span>verde = próximo passo</span><span>opaco = menos adequado</span></div>
          </div>
          <div class="investment-map" id="investment-map">
            <span class="axis-label axis-y-top">Mais líquido</span><span class="axis-label axis-y-bottom">Menos líquido</span>
            <span class="axis-label axis-x-left">Menos risco</span><span class="axis-label axis-x-right">Mais risco</span>
            <span class="axis-title-x">RISCO →</span><span class="axis-title-y">LIQUIDEZ →</span>
            <span class="quadrant q1">Reserva / proteção</span><span class="quadrant q2">Bolsa líquida</span><span class="quadrant q3">Prazo e disciplina</span><span class="quadrant q4">Longo prazo volátil</span>
            ${renderBubbles(r.universe_products||[])}
          </div>
        </div>
        <aside>
          <div class="detail-card" id="product-detail"></div>
          <div class="broker-card">
            <h4 class="broker-title">Abrir a porta, sem vender produto</h4>
            <p class="broker-text">A plataforma mostra caminhos. A decisão e a contratação continuam com você, em bancos e corretoras reais.</p>
            <div class="broker-grid">${brokers.map(([name,url])=>`<a class="broker-link" href="${url}" target="_blank" rel="noopener">${name}</a>`).join('')}</div>
          </div>
          <button class="btn-light btn-restart" onclick="restart()">← Fazer o diagnóstico novamente</button>
        </aside>
      </section>`;
    showPage('page-result');renderProductDetail(state.selectedProduct);
  }
  function renderBubbles(products){
    return products.map(p=>{
      const size = p.fit==='primary'?92:(p.fit==='secondary'?78:(p.fit==='goal'?72:62));
      const selected = state.selectedProduct && state.selectedProduct.id===p.id ? ' selected' : '';
      return `<button class="bubble ${p.fit}${selected}" id="bubble-${p.id}" style="left:${p.x}%;bottom:${p.y}%;width:${size}px;height:${size}px" onclick="selectProduct('${p.id}')">${shortName(p.name)}${p.matches_goal?'<small>sonho</small>':''}</button>`;
    }).join('');
  }
  function shortName(name){return name.replace('Fundos Imobiliários (FIIs)','FIIs').replace('Previdência Privada (PGBL / VGBL)','Previdência').replace('ETF Brasileiro','ETF').replace('Fundo de Renda Fixa','Fundo RF').replace('Fundo Multimercado','Multimercado').replace('Tesouro Selic','Tesouro Selic').replace('Tesouro IPCA+','IPCA+');}
  function selectProduct(id){state.selectedProduct=(state.result.universe_products||[]).find(p=>p.id===id);document.querySelectorAll('.bubble').forEach(b=>b.classList.remove('selected'));const b=document.getElementById('bubble-'+id);if(b)b.classList.add('selected');renderProductDetail(state.selectedProduct);}
  function renderProductDetail(p){
    if(!p)return;document.getElementById('product-detail').innerHTML=`
      <span class="fit-tag">${p.fit_label}</span><h3 class="detail-name">${p.name}</h3>
      <div class="detail-meta"><span class="pill">${p.category_label}</span><span class="pill">Risco: ${p.risk_label}</span><span class="pill">Liquidez: ${p.liquidity_label}</span><span class="pill">${p.minimum_label}</span></div>
      ${detailBlock('O que é',p.what_is)}${detailBlock('Como funciona',p.how_it_works)}${detailBlock('Quando faz sentido',p.makes_sense_when)}${detailBlock('Atenção',p.watch_out)}${detailBlock('Onde encontrar',p.where_to_find)}
    `;
  }
  function detailBlock(label,text){return `<div class="detail-block"><p class="detail-label">${label}</p><p class="detail-text">${text}</p></div>`;}
  function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
  function restart(){state={goal:null,questions:state.questions,goals:state.goals,answers:{},currentQ:0,result:null,selectedProduct:null};document.getElementById('progress').style.width='0%';document.getElementById('progress-label').textContent='0 / 6';document.getElementById('btn-goal').disabled=true;document.querySelectorAll('.goal-card').forEach(c=>c.classList.remove('sel'));showPage('page-goal');}
  init();
</script>
</body>
</html>
