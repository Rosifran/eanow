<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico — e agora?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #fafaf8;
    --bg2: #f2f1ee;
    --bg3: #e8e7e0;
    --white: #ffffff;
    --ink: #0f0f0f;
    --ink2: #3d3d3d;
    --ink3: #787878;
    --ink4: #b0b0b0;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.15);
    --border-hi: rgba(0,0,0,0.3);
    --r: 6px;
    --rlg: 10px;
    --rfull: 100px;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:56px;background:rgba(250,250,248,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
  .logo{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.02em;text-decoration:none;}
  .progress-bar{flex:1;max-width:320px;margin:0 40px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--ink);border-radius:2px;transition:width .4s ease;}
  .progress-label{font-size:11.5px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;}

  .page{display:none;min-height:100vh;padding:100px 24px 80px;}
  .page.active{display:flex;flex-direction:column;align-items:center;}

  .inner{width:100%;max-width:540px;}

  /* STEP: SONHO */
  .step-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;}
  .step-h{font-size:32px;font-weight:600;letter-spacing:-.03em;line-height:1.1;color:var(--ink);margin-bottom:10px;}
  .step-sub{font-size:14px;color:var(--ink3);line-height:1.65;margin-bottom:36px;font-weight:300;}

  .goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:32px;}
  .goal-card{border:1px solid var(--border-md);border-radius:var(--rlg);padding:16px 18px;cursor:pointer;background:var(--white);transition:all .12s;}
  .goal-card:hover{border-color:var(--border-hi);}
  .goal-card.sel{border:1.5px solid var(--ink);background:var(--white);}
  .goal-icon{font-size:20px;margin-bottom:8px;}
  .goal-title{font-size:13.5px;font-weight:500;color:var(--ink);line-height:1.35;}
  .goal-horizon{font-size:11px;color:var(--ink3);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

  /* STEP: PERGUNTAS */
  .q-num{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
  .q-text{font-size:20px;font-weight:500;letter-spacing:-.02em;line-height:1.3;color:var(--ink);margin-bottom:8px;}
  .q-insight{font-size:12px;color:var(--ink4);font-style:italic;margin-bottom:28px;font-family:'IBM Plex Mono',monospace;}

  .options{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;}
  .opt{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--border-md);border-radius:var(--r);cursor:pointer;background:var(--white);transition:all .12s;}
  .opt:hover{border-color:var(--border-hi);}
  .opt.sel{border:1.5px solid var(--ink);}
  .opt-radio{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--ink4);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;}
  .opt.sel .opt-radio{border-color:var(--ink);background:var(--ink);}
  .opt.sel .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--white);}
  .opt-text{font-size:13.5px;color:var(--ink);line-height:1.4;}

  .btn-row{display:flex;gap:10px;align-items:center;}
  .btn-next{padding:12px 28px;background:var(--ink);color:var(--white);border:none;border-radius:var(--rfull);font-size:14px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;}
  .btn-next:hover{opacity:.82;}
  .btn-next:disabled{opacity:.3;cursor:not-allowed;}
  .btn-back-sm{padding:12px 20px;background:transparent;border:1px solid var(--border-md);border-radius:var(--rfull);font-size:13px;font-family:'Inter',sans-serif;color:var(--ink3);cursor:pointer;transition:all .12s;}
  .btn-back-sm:hover{border-color:var(--border-hi);color:var(--ink);}

  /* RESULTADO */
  .result-profile{text-align:center;margin-bottom:40px;padding:32px 24px;background:var(--white);border:1px solid var(--border-md);border-radius:var(--rlg);}
  .result-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;}
  .result-type{font-size:40px;font-weight:600;letter-spacing:-.04em;color:var(--ink);margin-bottom:10px;}
  .result-desc{font-size:14px;color:var(--ink3);line-height:1.65;font-weight:300;max-width:400px;margin:0 auto 16px;}
  .result-msg{font-size:13.5px;color:var(--ink2);line-height:1.7;font-weight:300;padding:16px;background:var(--bg2);border-radius:var(--r);}

  .section-label{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:12px;margin-top:28px;}
  .goal-insight-box{padding:14px 18px;background:var(--bg2);border-radius:var(--r);margin-bottom:20px;}
  .goal-insight-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px;}
  .goal-insight-text{font-size:13.5px;color:var(--ink2);line-height:1.65;font-weight:300;}

  .product-card{border:1px solid var(--border);border-radius:var(--rlg);padding:18px 22px;margin-bottom:10px;background:var(--white);}
  .product-card.primary{border-color:var(--border-md);}
  .product-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
  .product-name{font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-.01em;}
  .product-cat{font-size:11px;padding:3px 10px;border-radius:var(--rfull);background:var(--bg2);color:var(--ink3);font-weight:500;}
  .product-meta{display:flex;gap:16px;margin-bottom:10px;}
  .meta-item{font-size:11.5px;color:var(--ink3);display:flex;align-items:center;gap:5px;}
  .meta-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .risk-muito_baixo{background:#22c55e;}
  .risk-baixo{background:#84cc16;}
  .risk-medio{background:#f59e0b;}
  .risk-alto{background:#ef4444;}
  .risk-variavel{background:#8b5cf6;}
  .product-body{display:none;}
  .product-card.open .product-body{display:block;}
  .product-body p{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:8px;font-weight:300;}
  .product-body p:last-child{margin-bottom:0;}
  .product-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:4px;margin-top:12px;}
  .product-toggle{font-size:12px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:8px;transition:color .12s;}
  .product-toggle:hover{color:var(--ink);}
  .product-where{font-size:12px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;padding:8px 12px;background:var(--bg2);border-radius:var(--r);margin-top:10px;}

  .source-note{font-size:11px;color:var(--ink4);font-family:'IBM Plex Mono',monospace;text-align:center;margin-top:28px;line-height:1.6;}

  .btn-restart{display:block;width:100%;padding:13px;background:transparent;border:1px solid var(--border-md);border-radius:var(--rfull);font-size:14px;font-family:'Inter',sans-serif;color:var(--ink3);cursor:pointer;text-align:center;margin-top:20px;transition:all .12s;}
  .btn-restart:hover{border-color:var(--border-hi);color:var(--ink);}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo">e agora?</a>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <span class="progress-label" id="progress-label">0 / 6</span>
</div>

<!-- PÁGINA 1: SONHO -->
<div id="page-goal" class="page active">
  <div class="inner">
    <p class="step-label">Passo 1 de 6</p>
    <h1 class="step-h">O que move você?</h1>
    <p class="step-sub">Escolha o objetivo que mais ressoa agora. Não precisa ser definitivo.</p>
    <div class="goals-grid" id="goals-grid"></div>
    <div class="btn-row">
      <button class="btn-next" id="btn-goal" onclick="goToQuestions()" disabled>Continuar →</button>
    </div>
  </div>
</div>

<!-- PÁGINA 2: PERGUNTAS (renderizada dinamicamente) -->
<div id="page-question" class="page">
  <div class="inner">
    <p class="q-num" id="q-num"></p>
    <h2 class="q-text" id="q-text"></h2>
    <p class="q-insight" id="q-insight"></p>
    <div class="options" id="options-list"></div>
    <div class="btn-row">
      <button class="btn-back-sm" onclick="prevQuestion()">← Voltar</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>Continuar →</button>
    </div>
  </div>
</div>

<!-- PÁGINA 3: RESULTADO -->
<div id="page-result" class="page">
  <div class="inner" id="result-inner"></div>
</div>

<script>
  let state = {
    goal: null,
    questions: [],
    goals: [],
    answers: {},
    currentQ: 0,
    result: null,
  };

  // Inicializa — busca perguntas e objetivos
  async function init() {
    const [qRes, gRes] = await Promise.all([
      fetch('/api/questions'),
      fetch('/api/goals')
    ]);
    state.questions = await qRes.json();
    state.goals = await gRes.json();
    renderGoals();
  }

  function renderGoals() {
    const icons = {
      viagem: '✈️', aposentadoria: '🌅', renda_passiva: '💸',
      empresa: '🚀', imovel: '🏠', filhos: '👧',
      seguranca: '🛡️', liberdade: '🗝️'
    };
    const horizons = {
      curto: 'Curto prazo', medio: 'Médio prazo',
      longo: 'Longo prazo', curto_medio: 'Curto a médio prazo',
      medio_longo: 'Médio a longo prazo'
    };
    const grid = document.getElementById('goals-grid');
    grid.innerHTML = state.goals.map(g => `
      <div class="goal-card" data-id="${g.id}" onclick="selectGoal(this)">
        <div class="goal-icon">${icons[g.id] || '💡'}</div>
        <p class="goal-title">${g.label}</p>
        <p class="goal-horizon">${horizons[g.horizon] || g.horizon}</p>
      </div>
    `).join('');
  }

  function selectGoal(el) {
    document.querySelectorAll('.goal-card').forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
    state.goal = el.dataset.id;
    document.getElementById('btn-goal').disabled = false;
  }

  function updateProgress() {
    const total = state.questions.length + 1;
    const current = state.currentQ + 1;
    const pct = Math.round((current / (total + 1)) * 100);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${current} / ${total}`;
  }

  function goToQuestions() {
    showPage('page-question');
    state.currentQ = 0;
    renderQuestion();
  }

  function renderQuestion() {
    const q = state.questions[state.currentQ];
    document.getElementById('q-num').textContent = `Pergunta ${state.currentQ + 1} de ${state.questions.length}`;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('q-insight').textContent = q.insight;

    const current = state.answers[q.id];
    document.getElementById('options-list').innerHTML = q.options.map(o => `
      <div class="opt${current === o.id ? ' sel' : ''}" data-qid="${q.id}" data-aid="${o.id}" onclick="selectAnswer(this)">
        <div class="opt-radio"></div>
        <span class="opt-text">${o.text}</span>
      </div>
    `).join('');

    document.getElementById('btn-next').disabled = !current;
    updateProgress();
  }

  function selectAnswer(el) {
    const qid = el.dataset.qid;
    const aid = el.dataset.aid;
    document.querySelectorAll(`.opt[data-qid="${qid}"]`).forEach(o => o.classList.remove('sel'));
    el.classList.add('sel');
    state.answers[qid] = aid;
    document.getElementById('btn-next').disabled = false;
  }

  async function nextQuestion() {
    if (state.currentQ < state.questions.length - 1) {
      state.currentQ++;
      renderQuestion();
    } else {
      await submitDiagnosis();
    }
  }

  function prevQuestion() {
    if (state.currentQ > 0) {
      state.currentQ--;
      renderQuestion();
    } else {
      showPage('page-goal');
      document.getElementById('progress').style.width = '0%';
      document.getElementById('progress-label').textContent = '0 / 6';
    }
  }

  async function submitDiagnosis() {
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').textContent = 'Analisando...';

    const res = await fetch('/api/script', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({answers: state.answers, goal: state.goal})
    });
    state.result = await res.json();
    renderResult();
  }

  function renderResult() {
    const r = state.result;
    document.getElementById('progress').style.width = '100%';
    document.getElementById('progress-label').textContent = 'Concluído';

    const profileColors = {
      preserver: '#0f6e56', follower: '#185fa5',
      independent: '#633806', accumulator: '#3c3489'
    };

    let html = `
      <div class="result-profile">
        <p class="result-badge">Seu perfil patrimonial</p>
        <h2 class="result-type" style="color:${profileColors[r.profile] || '#0f0f0f'}">${r.profile_label}</h2>
        <p class="result-desc">${r.profile_description}</p>
        <div class="result-msg">${r.profile_message}</div>
      </div>
    `;

    if (r.goal_insight) {
      html += `
        <div class="goal-insight-box">
          <p class="goal-insight-label">Para o seu objetivo: ${r.goal_label}</p>
          <p class="goal-insight-text">${r.goal_insight}</p>
        </div>
      `;
    }

    if (r.primary_products?.length) {
      html += `<p class="section-label">Produtos que fazem sentido para o seu perfil</p>`;
      r.primary_products.forEach(p => { html += productCard(p, true); });
    }

    if (r.secondary_products?.length) {
      html += `<p class="section-label" style="margin-top:24px;">Para explorar no futuro</p>`;
      r.secondary_products.forEach(p => { html += productCard(p, false); });
    }

    html += `
      <p class="source-note">${r.source}</p>
      <button class="btn-restart" onclick="restart()">← Fazer o diagnóstico novamente</button>
    `;

    document.getElementById('result-inner').innerHTML = html;
    showPage('page-result');
  }

  function productCard(p, primary) {
    return `
      <div class="product-card${primary ? ' primary' : ''}" id="pc-${p.id}">
        <div class="product-header">
          <span class="product-name">${p.name}</span>
          <span class="product-cat">${p.category_label}</span>
        </div>
        <div class="product-meta">
          <span class="meta-item">
            <span class="meta-dot risk-${p.risk}"></span>
            ${p.risk_label}
          </span>
          <span class="meta-item">⚡ ${p.liquidity_label}</span>
        </div>
        <span class="meta-item" style="font-size:11.5px;color:var(--ink3);">💰 ${p.minimum_label}</span>
        <div class="product-body" id="pb-${p.id}">
          <p class="product-label">O que é</p>
          <p>${p.what_is}</p>
          <p class="product-label">Como funciona</p>
          <p>${p.how_it_works}</p>
          <p class="product-label">Faz sentido quando</p>
          <p>${p.makes_sense_when}</p>
          <p class="product-label">Atenção</p>
          <p>${p.watch_out}</p>
          <div class="product-where">📍 ${p.where_to_find}</div>
        </div>
        <div class="product-toggle" onclick="toggleProduct('${p.id}')">
          <span id="pt-${p.id}">Ver mais</span> ↓
        </div>
      </div>
    `;
  }

  function toggleProduct(id) {
    const body = document.getElementById('pb-' + id);
    const card = document.getElementById('pc-' + id);
    const label = document.getElementById('pt-' + id);
    const isOpen = card.classList.contains('open');
    card.classList.toggle('open');
    label.textContent = isOpen ? 'Ver mais' : 'Ver menos';
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function restart() {
    state = {goal: null, questions: state.questions, goals: state.goals, answers: {}, currentQ: 0, result: null};
    document.getElementById('progress').style.width = '0%';
    document.getElementById('progress-label').textContent = '0 / 6';
    document.getElementById('btn-goal').disabled = true;
    document.querySelectorAll('.goal-card').forEach(c => c.classList.remove('sel'));
    showPage('page-goal');
  }

  init();
</script>
</body>
</html>
